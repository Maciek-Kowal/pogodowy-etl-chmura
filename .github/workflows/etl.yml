name: Zautomatyzowany Pipeline ETL Pogody

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  uruchom-skrypt-etl:
    runs-on: ubuntu-latest
    
    steps:
      - name: Pobranie kodu z repozytorium
        uses: actions/checkout@v3

      - name: Przygotowanie środowiska Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalacja wymaganych bibliotek
        run: pip install -r requirements.txt

      - name: Odtworzenie klucza dostępu do chmury GCP
        env:
          GCP_KEY: ${{ secrets.GCP_CREDENTIALS }}
        run: echo "$GCP_KEY" > gcp-klucz.json 

      - name: Uruchomienie procesu ETL
        run: python main.py